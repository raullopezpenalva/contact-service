spring.application.name=contact-service-test
server.port=0

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

app.notification.enabled=true
app.notifications.channels=TELEGRAM

telegram.bot.token=dummy
telegram.chat.id=0
telegram.api.base-url=https://api.telegram.org

# --- H2 Database Configuration ---
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- Security Configuration ---
spring.security.user.name=test
spring.security.user.password={noop}test

# --- Spring Mail Configuration for Testing ---
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration