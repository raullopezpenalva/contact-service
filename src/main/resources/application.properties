# --- Application Properties ---
spring.application.name=${SPRING_APPLICATION_NAME:contact-service}
server.port=${SPRING_SERVER_PORT}

# --- PostgreSQL Database Configuration ---
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- Security Configuration ---
spring.security.user.name=${SPRING_SECURITY_USER_NAME}
spring.security.user.password={noop}${SPRING_SECURITY_USER_PASSWORD}

# --- Notification Service Configuration ---
app.notification.enabled=${NOTIFICATION_ENABLED:true}
app.notifications.channels=${NOTIFICATIONS_CHANNELS:EMAIL}

telegram.bot.token=${TELEGRAM_BOT_TOKEN:dummy}
telegram.chat.id=${TELEGRAM_CHAT_ID:0}
telegram.api.base-url=${TELEGRAM_API_BASE_URL:dummy}

email.recipient=${EMAIL_RECIPIENT:dummy}

spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_SMTP_WRITE_TIMEOUT:5000}